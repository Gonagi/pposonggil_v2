<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="/image/21.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뽀송길</title>
</head>

<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>PPOSONG</span>
            <i class="fa-solid fa-cloud" style="color: #9fd8f6;"></i>
        </div>
        <div class="status-bar__column">
            <span>ver 0.6.2</span>
        </div>
    </div>

    <header class="alt-header">
        <div class="alt-header__column">
            <i class="fa-solid fa-angle-left fa-xl"></i>
        </div>
        <div class="alt-header__column">
            <h1 class="alt-header__title">거래 예약 설정</h1>
        </div>
        <div class="alt-header__column">
            <!-- 헤더 우측에 위치한 홈/마이페이지 버튼 -->
            <nav class="screen-header__menu">
                <ul class="screen-header__menu-list">
                    <li class="screen-header__menu-btn">
                        <a class="screen-header__menu-link" href="/main"><i class="fa-solid fa-house fa-lg"></i></a>
                    </li>
                    <li class="screen-header__menu-btn">
                        <a class="screen-header__menu-link" href="/main/mypage"><i
                                class="fa-solid fa-circle-user fa-lg"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="appoint-box">
        <form id="appointFrm">
            <div class="input-container" id="date-container">
                <label for="date">날짜:</label>
                <input type="date" id="date" name="date">
            </div>
            <div class="input-container" id="start-time-container">
                <label for="startTime">거래 시작 시각:</label>
                <input type="time" id="startTime" name="startTime">
            </div>
            <div class="input-container" id="end-time-container">
                <label for="endTime">거래 종료 시각:</label>
                <input type="time" id="endTime" name="endTime">
            </div>
            <div class="input-container" id="location-container">
                <label for="location">위치:</label>
                <input type="text" id="location" name="location" placeholder="거래 위치를 입력하세요">
            </div>
            <div class="submit-container">
                <input type="submit" value="거래 일정 확정">
            </div>
        </form>
    </div>

    <script src="https://kit.fontawesome.com/660f4d6ed1.js" crossorigin="anonymous"></script>
    <script src="/js/back.js"></script>
    <script src="/js/secondhand/appoint.js" type="module"></script>
</body>

</html>
